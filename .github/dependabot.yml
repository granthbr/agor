version: 2
updates:
  # Root workspace (devDependencies only)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'

  # Apps
  - package-ecosystem: 'npm'
    directory: '/apps/agor-cli'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/apps/agor-daemon'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/apps/agor-docs'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/apps/agor-ui'
    schedule:
      interval: 'weekly'

  # Packages
  - package-ecosystem: 'npm'
    directory: '/packages/core'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/packages/executor'
    schedule:
      interval: 'weekly'

  # packages/agor-live is a meta-package whose dependencies are synced from
  # other monorepo packages (see scripts/sync-agor-live-deps.mjs). Explicitly
  # listed here with a wildcard ignore to prevent Dependabot from opening PRs.
  - package-ecosystem: 'npm'
    directory: '/packages/agor-live'
    schedule:
      interval: 'weekly'
    ignore:
      - dependency-name: '*'
